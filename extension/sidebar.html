<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igufoz Cotação</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #0f2b4f;
      --orange: #FF6B00;
      --orange-lt: #fff3ea;
      --border: #e2e8f0;
      --muted:  #64748b;
      --red:    #dc2626;
      --green:  #16a34a;
      --radius: 8px;
      --text:   #1a2332;
      --bg:     #f8fafc;
    }
    body {
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px; color: var(--text);
      background: var(--bg);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    .hdr {
      background: var(--blue); color: #fff;
      padding: 11px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .hdr-logo { font-weight: 800; font-size: 15px; letter-spacing: -.5px; color: var(--orange); }
    .hdr-sub  { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
    .hdr-spacer { flex: 1; }
    .hdr-reset {
      background: none; border: 1px solid rgba(255,255,255,.25); color: #fff;
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    }
    .hdr-reset:hover { background: rgba(255,255,255,.1); }

    /* Scroll body */
    .body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    /* Section label */
    .sec-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted); margin-bottom: 5px;
    }

    /* Period grid */
    .period-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .period-cell { display: flex; flex-direction: column; gap: 3px; }
    .period-cell label { font-size: 11px; color: var(--muted); font-weight: 500; }
    input[type="date"] {
      width: 100%; padding: 6px 8px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 12px; color: var(--text);
      background: #fff; outline: none; transition: border-color .18s;
    }
    input[type="date"]:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,0,.1); }

    /* Hora picker */
    .hora-picker { position: relative; }
    .hora-btn {
      width: 100%; height: 33px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 9px; gap: 4px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: #fff; font-family: inherit; font-size: 12px; color: var(--text);
      cursor: pointer; transition: border-color .18s;
    }
    .hora-btn:hover, .hora-btn.open { border-color: var(--orange); }
    .hora-btn.placeholder span { color: var(--muted); }
    .hora-btn svg { flex-shrink: 0; transition: transform .2s; }
    .hora-btn.open svg { transform: rotate(180deg); }
    .hora-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 999;
      background: #fff; border: 1.5px solid var(--orange);
      border-radius: var(--radius); box-shadow: 0 6px 20px rgba(0,0,0,.12);
      max-height: 192px; overflow-y: auto; display: none;
    }
    .hora-dropdown.open { display: block; }
    .hora-opt {
      padding: 7px 10px; font-size: 12px; cursor: pointer; transition: background .12s;
    }
    .hora-opt:hover { background: var(--orange-lt); }
    .hora-opt.selected { background: var(--orange); color: #fff; font-weight: 600; }

    /* Collapsible selector */
    .col-sel { position: relative; }
    .col-btn {
      width: 100%; padding: 8px 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: #fff; font-family: inherit; font-size: 12px; color: var(--text);
      cursor: pointer; transition: border-color .18s; text-align: left;
    }
    .col-btn:hover, .col-btn.open { border-color: var(--orange); }
    .col-btn-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-btn-label.placeholder { color: var(--muted); }
    .col-btn svg { flex-shrink: 0; transition: transform .2s; }
    .col-btn.open svg { transform: rotate(180deg); }
    .col-panel {
      display: none; margin-top: 4px;
      border: 1.5px solid var(--orange); border-radius: var(--radius);
      background: #fff; box-shadow: 0 6px 20px rgba(0,0,0,.1);
      max-height: 220px; overflow-y: auto;
    }
    .col-panel.open { display: block; }

    /* Radio options (cat / prot) */
    .col-opt {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 9px 12px; cursor: pointer; transition: background .12s;
      border-bottom: 1px solid var(--border);
    }
    .col-opt:last-child { border-bottom: none; }
    .col-opt:hover { background: var(--orange-lt); }
    .col-opt.selected { background: var(--orange-lt); }
    .col-opt-radio {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px;
      transition: border-color .15s, background .15s;
    }
    .col-opt.selected .col-opt-radio { border-color: var(--orange); background: var(--orange); }
    .col-opt-body { flex: 1; }
    .col-opt-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
    .col-opt-price { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* Checkbox options (adicionais) */
    .add-opt {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 12px; cursor: pointer; transition: background .12s;
      border-bottom: 1px solid var(--border);
    }
    .add-opt:last-child { border-bottom: none; }
    .add-opt:hover { background: var(--orange-lt); }
    .add-opt.checked { background: #fff8f3; }
    .add-chk {
      width: 16px; height: 16px; border-radius: 4px;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .add-opt.checked .add-chk { border-color: var(--orange); background: var(--orange); }
    .add-chk-mark { display: none; color: #fff; font-size: 10px; font-weight: 700; }
    .add-opt.checked .add-chk-mark { display: block; }
    .add-opt-body { flex: 1; min-width: 0; }
    .add-opt-name { font-size: 12px; font-weight: 500; }
    .add-opt-price { font-size: 11px; color: var(--muted); }
    .add-qty {
      width: 48px; padding: 4px 6px; text-align: center;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 12px; font-family: inherit; outline: none;
    }
    .add-qty:focus { border-color: var(--orange); }

    /* Extras */
    .extras-list { display: flex; flex-direction: column; gap: 6px; }
    .extra-row { display: flex; gap: 5px; align-items: center; }
    .extra-desc {
      flex: 1; padding: 6px 8px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 12px; outline: none;
    }
    .extra-preco {
      width: 80px; padding: 6px 8px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 12px; outline: none;
    }
    .extra-desc:focus, .extra-preco:focus { border-color: var(--orange); }
    .rm-btn {
      background: none; border: none; color: var(--red);
      font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px; flex-shrink: 0;
    }
    .add-extra-btn {
      background: none; border: 1.5px dashed var(--border); border-radius: var(--radius);
      color: var(--muted); width: 100%; padding: 7px; font-size: 12px; cursor: pointer;
      transition: border-color .18s, color .18s;
    }
    .add-extra-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); }

    /* Footer */
    .footer {
      flex-shrink: 0; background: #fff;
      border-top: 2px solid var(--border); padding: 11px 14px;
    }
    .dias-badge { font-size: 11px; color: var(--muted); margin-bottom: 5px; text-align: right; }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .total-label { font-size: 13px; font-weight: 600; }
    .total-value { font-size: 20px; font-weight: 800; color: var(--orange); }
    .copy-btn {
      width: 100%; background: var(--orange); color: #fff; border: none;
      border-radius: var(--radius); padding: 10px; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: background .18s;
    }
    .copy-btn:hover { background: #e55e00; }
    .copy-btn.copied { background: var(--green); }

    /* State */
    .state-msg { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }
    .err-msg { color: var(--red); font-size: 12px; line-height: 1.6; }
    .retry-btn {
      margin-top: 8px; padding: 6px 14px; background: var(--orange);
      color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .chevron { display: inline-block; }
  </style>
</head>
<body>
  <div class="hdr">
    <div>
      <div class="hdr-logo">igufoz</div>
      <div class="hdr-sub">cotação rápida</div>
    </div>
    <div class="hdr-spacer"></div>
    <button class="hdr-reset" id="resetBtn">Limpar</button>
  </div>

  <div class="body" id="body">
    <div class="state-msg" id="loading">Carregando dados…</div>
  </div>

  <div class="footer" id="footer" style="display:none">
    <div class="dias-badge" id="diasBadge"></div>
    <div class="total-row">
      <span class="total-label" id="totalLabel">Total estimado</span>
      <span class="total-value" id="totalVal">R$ 0,00</span>
    </div>
    <div class="total-row" id="primeRow" style="display:none;margin-bottom:2px">
      <span class="total-label" style="font-size:12px;color:var(--muted)">⭐ Com prime</span>
      <span class="total-value" id="primeVal" style="font-size:16px;color:var(--green)">R$ 0,00</span>
    </div>
    <button class="copy-btn" id="copyBtn">📋 Copiar cotação</button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
