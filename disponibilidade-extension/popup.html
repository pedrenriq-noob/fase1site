<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disponibilidade — Igufoz</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13" rx="2"/>
        <path d="M16 8h4l3 5v3h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/>
        <circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
      <span>Disponibilidade</span>
    </div>
    <div class="header-sub">I-Frotas · Tempo real</div>
  </header>

  <!-- FORM -->
  <form id="form" class="form" autocomplete="off">
    <div class="field-group">
      <label class="label">Retirada</label>
      <div class="dt-row">
        <input type="date" id="retData" class="input input-date" required>
        <input type="time" id="retHora" class="input input-time" required>
      </div>
    </div>
    <div class="field-group">
      <label class="label">Devolução</label>
      <div class="dt-row">
        <input type="date" id="devData" class="input input-date" required>
        <input type="time" id="devHora" class="input input-time" required>
      </div>
    </div>
    <div id="form-err" class="form-err" hidden></div>
    <button type="submit" id="btn-consultar" class="btn-consultar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Consultar disponibilidade
    </button>
  </form>

  <!-- RESULTS -->
  <div id="results" class="results" hidden>
    <div class="results-header">
      <span id="results-period" class="results-period"></span>
      <span id="results-summary" class="results-summary"></span>
    </div>
    <div id="cat-list" class="cat-list"></div>
  </div>

  <!-- LOADING -->
  <div id="loading" class="loading" hidden>
    <div class="spinner"></div>
    <span>Consultando frota…</span>
  </div>

  <!-- EMPTY -->
  <div id="empty" class="empty" hidden>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
    </svg>
    <p>Nenhuma categoria encontrada.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
