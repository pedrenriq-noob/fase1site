<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igufoz — Aluguel de Veículos em Foz do Iguaçu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container" id="app">

    <!-- Header -->
    <header class="header header-dark" id="main-header">
      <div class="header-inner">
        <div class="header-brand">
          <img src="logo-igufoz.png" alt="Igufoz" class="header-logo-img" onerror="this.style.display='none'">
          <div class="header-logo-text">
            <span class="header-logo-name">igufoz</span>
            <span class="header-logo-sub">aluguel de veículos</span>
          </div>
        </div>
        <nav class="header-nav">
          <a href="#">Frota</a>
          <a href="#">Sobre</a>
          <a href="#">Contato</a>
        </nav>
        <button class="header-account-btn">Minha conta</button>
      </div>
    </header>

    <!-- Progress line (usado pelo JS) -->
    <div class="progress-bar" aria-hidden="true">
      <div class="progress" id="progress"></div>
    </div>

    <!-- Step indicator (oculto na landing) -->
    <div class="steps" id="steps-bar">
      <div class="step" data-step="1">
        <div class="step-num">1</div>
        <div class="step-label">Período</div>
      </div>
      <div class="step-connector"></div>
      <div class="step" data-step="2">
        <div class="step-num">2</div>
        <div class="step-label">Proteção</div>
      </div>
      <div class="step-connector"></div>
      <div class="step" data-step="3">
        <div class="step-num">3</div>
        <div class="step-label">Adicionais</div>
      </div>
      <div class="step-connector"></div>
      <div class="step" data-step="4">
        <div class="step-num">4</div>
        <div class="step-label">Seus Dados</div>
      </div>
    </div>

    <!-- Dynamic content -->
    <div id="content"></div>

    <!-- Sidebar resumo -->
    <aside class="summary" id="summary">
      <h3>Resumo do Pedido</h3>
      <div id="summaryContent"></div>
    </aside>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
