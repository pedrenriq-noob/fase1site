<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igufoz Cotação</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #0f2b4f;
      --orange:    #FF6B00;
      --border:    #e2e8f0;
      --muted:     #64748b;
      --red:       #dc2626;
      --green:     #16a34a;
      --radius:    8px;
      --text:      #1a2332;
      --bg:        #f8fafc;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hdr {
      background: var(--blue);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .hdr-logo { font-weight: 800; font-size: 16px; letter-spacing: -.5px; color: var(--orange); }
    .hdr-sub  { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
    .hdr-spacer { flex: 1; }
    .hdr-reset {
      background: none; border: 1px solid rgba(255,255,255,.2); color: #fff;
      border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    }
    .hdr-reset:hover { background: rgba(255,255,255,.08); }

    .body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sec-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .period-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .period-cell { display: flex; flex-direction: column; gap: 4px; }
    .period-cell label { font-size: 11px; color: var(--muted); font-weight: 500; }

    input[type="date"],
    input[type="time"],
    select,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 7px 9px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .18s;
      appearance: auto;
    }
    input:focus, select:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,0,.1); }
    select { cursor: pointer; }
    select[size] { height: auto; }

    .add-list { display: flex; flex-direction: column; gap: 6px; }
    .add-item { display: flex; align-items: center; gap: 6px; }
    .add-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; flex-shrink: 0; }
    .add-item-label { flex: 1; font-size: 12px; line-height: 1.3; }
    .add-item-label small { display: block; color: var(--muted); font-size: 10px; }
    .add-item-qty { width: 52px; padding: 5px 6px; font-size: 12px; text-align: center; }

    .extras-list { display: flex; flex-direction: column; gap: 6px; }
    .extra-row { display: flex; gap: 6px; align-items: center; }
    .extra-row input[type="text"] { flex: 1; }
    .extra-row input[type="number"] { width: 88px; }
    .extra-row .rm-btn {
      background: none; border: none; color: var(--red); font-size: 17px;
      cursor: pointer; line-height: 1; padding: 0 2px; flex-shrink: 0;
    }

    .add-extra-btn {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      width: 100%;
      padding: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .18s, color .18s;
    }
    .add-extra-btn:hover { border-color: var(--orange); color: var(--orange); }

    .footer {
      flex-shrink: 0;
      background: #fff;
      border-top: 2px solid var(--border);
      padding: 12px 16px;
    }
    .dias-badge { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-align: right; }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .total-label { font-size: 13px; font-weight: 600; }
    .total-value { font-size: 20px; font-weight: 800; color: var(--orange); }

    .copy-btn {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
    }
    .copy-btn:hover { background: #e55e00; }
    .copy-btn.copied { background: var(--green); }

    .state-msg { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }
    .err-msg { color: var(--red); font-size: 12px; line-height: 1.6; }
    .retry-btn {
      margin-top: 8px; padding: 6px 14px;
      background: var(--orange); color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
    }

    .divider { border: none; border-top: 1px solid var(--border); }
    .scroll-select { height: 140px; }
  </style>
</head>
<body>

  <div class="hdr">
    <div>
      <div class="hdr-logo">igufoz</div>
      <div class="hdr-sub">cotação rápida</div>
    </div>
    <div class="hdr-spacer"></div>
    <button class="hdr-reset" id="resetBtn">Limpar</button>
  </div>

  <div class="body" id="body">
    <div class="state-msg" id="loading">Carregando dados…</div>
  </div>

  <div class="footer" id="footer" style="display:none">
    <div class="dias-badge" id="diasBadge"></div>
    <div class="total-row">
      <span class="total-label">Total estimado</span>
      <span class="total-value" id="totalVal">R$ 0,00</span>
    </div>
    <button class="copy-btn" id="copyBtn">📋 Copiar cotação</button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
